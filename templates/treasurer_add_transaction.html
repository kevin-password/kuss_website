{% extends 'base.html' %}
{% block title %}Add Transaction - KUSS{% endblock %}

{% block content %}
<section class="page-header">
    <h1><i class="fa-solid fa-plus"></i> Add New Transaction</h1>
    <p>Record income or expense</p>
</section>

<section class="section container">
    <div class="form-container">
        <h2 style="color: var(--navy); margin-bottom: 20px;">New Transaction</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label for="transaction_type">Transaction Type *</label>
                <select id="transaction_type" name="transaction_type" required 
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                    <option value="INCOME">Income</option>
                    <option value="EXPENSE">Expense</option>
                </select>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="category">Category *</label>
                <select id="category" name="category" required 
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                    <option value="">-- Select Category --</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }} ({{ cat.get_category_type_display }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="amount">Amount (UGX) *</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="description">Description *</label>
                <textarea id="description" name="description" rows="3" required 
                          style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;"></textarea>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="reference_number">Reference Number (Optional)</label>
                <input type="text" id="reference_number" name="reference_number" 
                       placeholder="Receipt number, transaction ID, etc."
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label for="date">Date *</label>
                <input type="date" id="date" name="date" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-submit" style="flex: 1;">
                    <i class="fa-solid fa-save"></i> Save Transaction
                </button>
                <a href="{% url 'treasurer_dashboard' %}" class="btn btn-outline" style="flex: 0; padding: 15px 25px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
