{% extends 'base.html' %}
{% block title %}Create News - KUSS{% endblock %}
{% block content %}
<section class="page-header"><h1>Create News Post</h1></section>
<section class="section container">
    <div class="form-container">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label>Title</label>
                <input type="text" name="title" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Content</label>
                <textarea name="content" rows="6" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;"></textarea>
            </div>
            <div style="margin-bottom: 20px;">
                <label>Image (optional)</label>
                <input type="file" name="image" accept="image/*" style="width: 100%; padding: 10px;">
            </div>
            <button type="submit" class="btn-submit">Publish News</button>
        </form>
    </div>
</section>
{% endblock %}
