{% extends 'base.html' %}
{% block title %}Create Announcement - KUSS{% endblock %}
{% block content %}
<section class="page-header"><h1>Create Announcement</h1></section>
<section class="section container">
    <div class="form-container">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label>Title</label>
                <input type="text" name="title" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Description</label>
                <textarea name="description" rows="4" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;"></textarea>
            </div>
            <div style="margin-bottom: 20px;">
                <label>Document (PDF/Word/Image)</label>
                <input type="file" name="document" style="width: 100%; padding: 10px;">
            </div>
            <button type="submit" class="btn-submit">Publish Announcement</button>
        </form>
    </div>
</section>
{% endblock %}
